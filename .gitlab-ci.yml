stages:
  - build
  - deploy-prod

variables:
  NGINX_IMAGE: ${CI_REGISTRY_IMAGE}/nginx
  API_IMAGE: ${CI_REGISTRY_IMAGE}/api

# Solo se ejecuta cuando se pushea un tag con formato mediciones-ia-vX.Y.Z
.on-tag:
  rules:
    - if: $CI_COMMIT_TAG =~ /^mediciones-ia-v\d+\.\d+\.\d+$/

# ============================================
# PRE: se lanza automáticamente al pushear tag
# ============================================
build-images:
  stage: build
  extends: .on-tag
  tags:
    - medicionesia
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "Building tag ${CI_COMMIT_TAG}..."

    # Build nginx
    - docker build --target nginx -t "${NGINX_IMAGE}:${CI_COMMIT_TAG}" -t "${NGINX_IMAGE}:latest" .

    # Build api
    - docker build --target api -t "${API_IMAGE}:${CI_COMMIT_TAG}" -t "${API_IMAGE}:latest" .

    # Push
    - docker push "${NGINX_IMAGE}:${CI_COMMIT_TAG}"
    - docker push "${NGINX_IMAGE}:latest"
    - docker push "${API_IMAGE}:${CI_COMMIT_TAG}"
    - docker push "${API_IMAGE}:latest"

    - echo "Images pushed to ${CI_REGISTRY_IMAGE}"

# ============================================
# PROD: se lanza manualmente desde GitLab UI
# ============================================
deploy-prod:
  stage: deploy-prod
  tags:
    - medicionesia
  rules:
    - if: $CI_COMMIT_TAG =~ /^mediciones-ia-v\d+\.\d+\.\d+$/
      when: manual
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - VERSION=${CI_COMMIT_TAG#mediciones-ia-}
    - echo "Promoting ${VERSION} to PROD..."

    # Re-tag las imágenes de PRE como -prod
    - docker pull "${NGINX_IMAGE}:${CI_COMMIT_TAG}"
    - docker pull "${API_IMAGE}:${CI_COMMIT_TAG}"

    - docker tag "${NGINX_IMAGE}:${CI_COMMIT_TAG}" "${NGINX_IMAGE}:${CI_COMMIT_TAG}-prod"
    - docker tag "${NGINX_IMAGE}:${CI_COMMIT_TAG}" "${NGINX_IMAGE}:prod"
    - docker tag "${API_IMAGE}:${CI_COMMIT_TAG}" "${API_IMAGE}:${CI_COMMIT_TAG}-prod"
    - docker tag "${API_IMAGE}:${CI_COMMIT_TAG}" "${API_IMAGE}:prod"

    - docker push "${NGINX_IMAGE}:${CI_COMMIT_TAG}-prod"
    - docker push "${NGINX_IMAGE}:prod"
    - docker push "${API_IMAGE}:${CI_COMMIT_TAG}-prod"
    - docker push "${API_IMAGE}:prod"

    - echo "PROD images pushed to ${CI_REGISTRY_IMAGE}"
