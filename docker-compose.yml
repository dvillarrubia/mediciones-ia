services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    container_name: mediciones-ia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mediciones

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: mediciones-ia-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3003
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
    volumes:
      - mediciones_data:/app/data
      - ./logs:/app/logs
    networks:
      - mediciones
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mediciones_data:
    driver: local

networks:
  mediciones:
    driver: bridge
