# ===========================================
# Docker Compose para Producción
#
# Uso:
#   docker compose -f docker-compose.prod.yml up -d --build
# ===========================================

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    container_name: mediciones-ia-nginx
    restart: always
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mediciones
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      - "traefik.http.routers.mediciones.rule=Host(`mediciones.srv817047.hstgr.cloud`)"
      - "traefik.http.routers.mediciones.entrypoints=websecure"
      - "traefik.http.routers.mediciones.tls.certresolver=mytlschallenge"
      - "traefik.http.services.mediciones.loadbalancer.server.port=80"
      - "traefik.http.routers.mediciones-http.rule=Host(`mediciones.srv817047.hstgr.cloud`)"
      - "traefik.http.routers.mediciones-http.entrypoints=web"
      - "traefik.http.routers.mediciones-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: mediciones-ia-api
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3003
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY_ENCRYPTION_SECRET=${API_KEY_ENCRYPTION_SECRET}
    volumes:
      - mediciones_data:/app/data
      - ./logs:/app/logs
    networks:
      - mediciones
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mediciones_data:
    driver: local

networks:
  mediciones:
    driver: bridge
  traefik-public:
    name: root_default
    external: true
